services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: turborepo
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: pnpm --filter=api start
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 8000
      ALLOW_CORS_URL: http://localhost:3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: password
      DB_NAME: turborepo
      DB_SSL: 'false'
      ACCESS_TOKEN_SECRET: bc63d848ca6e651b3b848bd96ef1ad1eb9b31afc9cad67ed5953efd023d02ffe
      ACCESS_TOKEN_EXPIRATION: 3d
      REFRESH_TOKEN_SECRET: bc63d848ca6e651b3b848bd96ef1ad1eb9b31afc9cad67ed5953efd023d02ffe
      REFRESH_TOKEN_EXPIRATION: 30d
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_IGNORE_TLS: 'true'
      MAIL_USERNAME: ''
      MAIL_PASSWORD: ''
      FILE_SYSTEM: public
      FILE_MAX_SIZE: 20971520
    ports:
      - '8000:8000'
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: pnpm --filter=web start
    environment:
      NODE_ENV: development
      PORT: 3000
      API_URL: http://api:8000/api
      AUTH_SECRET: sfdlsfdsfdfdsdfk
      AUTH_SESSION_AGE: 7776000
      AUTH_URL: http://localhost:3000
    ports:
      - '3000:3000'
    depends_on:
      - api

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - '1025:1025'
      - '8025:8025'

volumes:
  postgres_data:
